<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="intl" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6d5efc">
<title>BerryStudio — بيري ستوديو</title>
<meta name="description" content="Bilingual fashion pattern design & grading — draft, grade, preview in 3D and export print-ready patterns.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="intl" data-mode="light" data-contrast="normal">

<div id="app">

  <!-- ===== TOP BAR ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo" id="logo"><img src="icons/icon.svg" alt="BerryStudio" width="34" height="34"></span>
      <span><span class="brand-name" id="brandName">BerryStudio</span><br><span class="brand-sub" id="brandSub">Fashion Pattern Design</span></span>
    </div>

    <div class="seg hide-sm" id="catSeg" style="margin-inline-start:12px">
      <button data-cat="women" class="active" data-i18n="women">Women</button>
      <button data-cat="men" data-i18n="men">Men</button>
      <button data-cat="girls" data-i18n="girls">Girls</button>
      <button data-cat="boys" data-i18n="boys">Boys</button>
    </div>

    <div class="spacer"></div>

    <div class="seg" id="viewToggle">
      <button data-v="2d" class="active">2D Pattern</button>
      <button data-v="3d">3D Preview</button>
    </div>

    <button class="pill" id="unitsPill"><span class="u">cm</span></button>
    <button class="icon-btn" id="cmdBtn">⌘</button>
    <button class="icon-btn" id="themeBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3a9 9 0 1 0 0 18c1 0 1.5-1 1-2s0-2 1-2h2a4 4 0 0 0 4-4c0-5-4-8-8-8z"/><circle cx="7.5" cy="11.5" r="1"/><circle cx="12" cy="8" r="1"/><circle cx="16" cy="11" r="1"/></svg></button>
    <button class="icon-btn" id="langBtn" style="font-weight:800;font-size:12px">ع / EN</button>
    <button class="icon-btn" id="modeBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></button>
    <button class="icon-btn" id="settingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5c.1-.3.1-.6.1-1z"/></svg></button>
    <button class="icon-btn hidden" id="installBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M4 21h16"/></svg></button>
  </header>

  <!-- ===== WORKSPACE ===== -->
  <div class="workspace">

    <!-- tool rail -->
    <aside class="left-rail toolrail" id="toolrail"></aside>

    <!-- center stage -->
    <main class="stage">
      <div class="stage-toolbar">
        <button class="chip" id="gridBtn" title="Grid" style="cursor:pointer"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
        <button class="chip" id="snapBtn" title="Snap" style="cursor:pointer"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 3v8a6 6 0 0 0 12 0V3"/><path d="M6 3h4v4H6zM14 3h4v4h-4z"/></svg></button>
        <div style="width:1px;height:20px;background:var(--line)"></div>
        <span class="chip" id="chipSize"></span>
        <span class="chip" id="chipStd"></span>
        <span class="chip" id="chipChest"></span>
      </div>

      <div class="canvas-wrap">
        <canvas id="patternCanvas"></canvas>

        <!-- 3D layer -->
        <div class="view3d-wrap" id="view3d">
          <canvas id="canvas3d"></canvas>
          <div style="position:absolute;inset-inline-start:16px;top:16px;display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;box-shadow:var(--shadow-2)">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700"><input type="checkbox" id="spinToggle" checked> 360°</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700"><input type="checkbox" id="walkToggle" checked> Walk</label>
          </div>
        </div>

        <!-- empty state -->
        <div id="emptyState" class="hidden" style="position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:4">
          <div style="max-width:340px">
            <div style="width:88px;height:88px;margin:0 auto 18px;border-radius:24px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:var(--brand-ink)"><svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M9 2l3 3 3-3 2 5-3 3 4 12H6l4-12-3-3z"/></svg></div>
            <p style="color:var(--ink-2);font-size:14px;line-height:1.6;margin-bottom:18px" data-i18n="empty2d">Pick a pattern to begin.</p>
            <button class="big-btn" id="emptyDraft" data-i18n="startDraft" style="margin-bottom:8px">Start Drafting</button>
            <button class="big-btn ghost" id="emptyLib" data-i18n="openLibrary">Open Library</button>
          </div>
        </div>

        <!-- piece info popover -->
        <div class="piece-info" id="pieceInfo" style="inset-inline-start:24px;bottom:70px"></div>

        <!-- zoom -->
        <div class="zoombar">
          <button id="zout">−</button>
          <span class="zval" id="zval">100%</span>
          <button id="zin">+</button>
          <button id="zfit"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg></button>
        </div>
      </div>
    </main>

    <!-- right rail -->
    <aside class="right-rail" id="rightRail">
      <div class="rail-tabs" id="railTabs"></div>
      <div class="rail-body">
        <div class="rail-pane active" data-pane="size"></div>
        <div class="rail-pane" data-pane="measure"></div>
        <div class="rail-pane" data-pane="layers"></div>
        <div class="rail-pane" data-pane="library"></div>
        <div class="rail-pane" data-pane="ai"></div>
        <div class="rail-pane" data-pane="export"></div>
      </div>
    </aside>

  </div>
</div>

<!-- ===== MODALS ===== -->
<div class="overlay" id="themeModal">
  <div class="modal">
    <div class="modal-head"><div><h2 data-i18n="theme">Theme</h2><p data-i18n="tt_theme">Choose a look</p></div></div>
    <div class="modal-body"></div>
    <div class="modal-foot"><button class="big-btn" data-close="#themeModal" data-i18n="close" style="width:auto;padding:10px 22px">Close</button></div>
  </div>
</div>

<div class="overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-head"><div><h2 data-i18n="settings">Settings</h2></div></div>
    <div class="modal-body"></div>
    <div class="modal-foot"><button class="big-btn" data-close="#settingsModal" data-i18n="close" style="width:auto;padding:10px 22px">Close</button></div>
  </div>
</div>

<div class="overlay cmdk" id="cmdModal">
  <div class="modal">
    <input class="cmd-input" id="cmdInput" data-i18n-ph="cmdPlaceholder" placeholder="Type a command…">
    <div class="cmd-list" id="cmdList"></div>
  </div>
</div>

<div class="overlay" id="genericModal">
  <div class="modal wide">
    <div class="modal-head"><div><h2>—</h2></div></div>
    <div class="modal-body"></div>
    <div class="modal-foot"><button class="big-btn" data-close="#genericModal" data-i18n="close" style="width:auto;padding:10px 22px">Close</button></div>
  </div>
</div>

<div class="overlay" id="onbModal">
  <div class="modal">
    <div class="modal-body" style="text-align:center;padding:32px">
      <div class="onb-hero"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M8 2l4 3 4-3 5 4-3 4v11H6V10L3 6z"/></svg></div>
      <h2 id="onbTitle" style="font-size:22px;margin-bottom:10px">Welcome</h2>
      <p id="onbBody" style="color:var(--ink-2);font-size:14px;line-height:1.6;max-width:420px;margin:0 auto"></p>
      <div class="onb-steps" id="onbDots"></div>
    </div>
    <div class="modal-foot" style="justify-content:space-between">
      <button class="big-btn ghost" id="onbSkip" data-i18n="skip" style="width:auto;padding:10px 20px">Skip</button>
      <div style="display:flex;gap:8px">
        <button class="big-btn ghost" id="onbBack" data-i18n="back" style="width:auto;padding:10px 20px">Back</button>
        <button class="big-btn" id="onbNext" data-i18n="next" style="width:auto;padding:10px 26px">Next</button>
      </div>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/canvas.js"></script>
<script src="js/three-view.js"></script>
<script src="js/app.js"></script>
</body>
</html>
